<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title — overridden per page by react-helmet-async -->
    <title>Rainboots Marketing — Seattle Digital Marketing Agency</title>

    <!-- Default meta description — overridden per page by react-helmet-async -->
    <meta
      name="description"
      content="Seattle-based digital marketing agency specializing in email, SMS, lifecycle marketing, customer acquisition, web development and branding. 25+ years combined experience."
    />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rainboots Marketing" />
    <meta
      property="og:title"
      content="Rainboots Marketing — Seattle Digital Marketing Agency"
    />
    <meta
      property="og:description"
      content="Seattle-based digital marketing agency. Email, SMS, lifecycle, acquisition, web development and branding."
    />
    <meta property="og:url" content="https://rainbootsmarketing.com" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Rainboots Marketing — Seattle Digital Marketing Agency"
    />
    <meta
      name="twitter:description"
      content="Seattle-based digital marketing agency. Email, SMS, lifecycle, acquisition, web development and branding."
    />

    <!-- Canonical default -->
    <link rel="canonical" href="https://rainbootsmarketing.com" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/favicon-192x192.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Theme -->
    <meta name="theme-color" content="#2b5ce6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rainboots" />
    <meta name="application-name" content="Rainboots Marketing" />
    <meta name="msapplication-TileColor" content="#2b5ce6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
